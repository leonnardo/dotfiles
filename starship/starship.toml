add_newline = true
continuation_prompt = "[❯❯](238) "

format = """
$directory$git_branch${custom.git_dirty}${custom.git_ahead_behind}$fill$python$hostname$line_break$character"""

right_format = ""

[character]
success_symbol = "[❯](240)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](240)"

[hostname]
ssh_only = false
format = " [$hostname](250)"

[fill]
symbol = " "

[directory]
format = "[$path](white) "
style = "white"
truncation_length = 0
truncate_to_repo = false

[git_branch]
symbol = " "
format = "[$symbol$branch](cyan)"

[custom.git_dirty]
command = "git diff --quiet --ignore-submodules --cached && git diff --quiet --ignore-submodules || printf '*'"
when = "git rev-parse --is-inside-work-tree"
format = "[$output](cyan) "

[custom.git_ahead_behind]
command = "upstream=$(git rev-parse --abbrev-ref --symbolic-full-name '@{upstream}' 2>/dev/null) || exit 0; ahead=$(git rev-list --count \"$upstream\"..HEAD 2>/dev/null); behind=$(git rev-list --count HEAD..\"$upstream\" 2>/dev/null); [ \"${behind:-0}\" -gt 0 ] && printf '⇣'; [ \"${ahead:-0}\" -gt 0 ] && printf '⇡'"
when = "git rev-parse --is-inside-work-tree"
format = "[$output](cyan) "

[python]
symbol = " "
format = "[$symbol$virtualenv]($style)"
style = "default"
pyenv_version_name = false
detect_extensions = []
detect_files = []
detect_folders = []

[cmd_duration]
disabled = true
