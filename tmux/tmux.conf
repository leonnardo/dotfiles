# set is an alias for set-option
# -p is to set for pane
# -w is to set for window
# -s is to set for server
# otherwise, it is for session
# if option isn't an user option, -w or -s maybe unnecessary
# -g sets the global session or window option
#
# -a append to the option
# example: set -g status-left "foo"
#          set -ag status-left "bar"
# will result in status-left "foobar"
# setw is an alias for set -w

# colors
set -g default-terminal "tmux-256color"
# set -g default-terminal "xterm-256color"
set -as terminal-features ",*:RGB"
set -ga update-environment "TERM_PROGRAM"
# set -as terminal-features "tmux-256color:RGB"

# undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# underscore colours - needs tmux-3.0
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# xterm keys options
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g monitor-activity off

set -g monitor-bell on
set -g bell-action any
set -g visual-bell off

set -g detach-on-destroy off

# TODO: melhorar bordas
set -g pane-border-style "fg=#697392,bg=default"
set -g pane-active-border-style "fg=#7AA2F7,bg=default"
set -g pane-border-format '#{?pane_active,#[fg=#7AA2F7],#[fg=#697392]}'
set -g pane-border-status off
set -g focus-events on

set -g prefix C-Space
bind C-Space send-prefix

# reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display 'config reloaded'

# mouse mode
set -g mouse on
set -g set-clipboard on
set -g allow-passthrough all

# don't rename windows automatically
set -g allow-rename off

# send session name to terminal title
set -g set-titles on
set -g set-titles-string "#S"

# renumber windows when a window is closed
set -g renumber-windows on

# start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# hook for resizing panes on client resize
set-hook -g client-resized resize-pane

# Allows for faster key repetition
set -g escape-time 10

# tmux messages are displayed for 2 seconds
set -g display-time 2000

# increase scrollback buffer size
set -g history-limit 50000

# Tokyo Night Base16 Color Variables
base00="#000000"  # background - Default Background
base01="#232429"  # black - Lighter Background (Used for status bars, line number and folding marks)
base02="#414868"  # brightBlack - Selection Background
base05="#C0CAF5"  # white/brightWhite - Default Foreground, Caret, Delimiters, Operators
base0D="#7AA2F7"  # blue/brightBlue - Functions, Methods, Attribute IDs, Headings
base0E="#BB9AF7"  # purple/brightPurple - Keywords, Storage, Selector, Markup Italic, Diff Changed

# ── Session Indicator ─────────────────────────────────────────────
set -g @status_session "#{?client_prefix,#[bg=$base0E]#[fg=$base00],#[bg=$base0D]#[fg=$base00]}  #S #[default]"

# ── Status Line Assembly ──────────────────────────────────────────
set -g status-position top
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=default,fg=default"
set -g window-style "bg=default"
set -g window-active-style "bg=default"
set -g status-left-length 300
set -g status-right-length 300

# Message and mode styles
set -g message-style "fg=$base0D,bg=$base01"
set -g message-command-style "fg=$base0E,bg=$base01"
set -g mode-style "fg=$base05,bg=$base02"

set -g status-left "#{E:@status_session} #[fg=$base02]"
set -g status-right "#[fg=#697392]#h"

set -g window-status-style "fg=#697392,bg=default"
set -g window-status-format "#[fg=#697392]#I:#{=15:window_name}"
set -g window-status-current-style "fg=$base0D,bg=default,bold"
set -g window-status-current-format "#[fg=$base0D,bold]#I:#{=15:window_name}"
set -g window-status-separator " "

# no confirm before kill pane/window
bind w kill-pane

# kill window with all panes no confirm
bind x kill-window

bind - splitw -v -c "#{pane_current_path}"
bind % splitw -h -c "#{pane_current_path}"
bind @ choose-tree 'join-pane -s "%%"'

# new window
bind t new-window -c "#{pane_current_path}"

# Switch ? and /
bind ? list-keys -N
bind / command-prompt -k -p key { list-keys -1N "%%" }

# Open Lazygit in cwd
bind g display-popup -E -w 90% -h 70% lazygit

# File picker with fzf (for AI coding assistants)
bind C-j display-popup -E -w 80% -h 60% "tmux-file-picker"

# Man popup with fzf
bind M display-popup -E -y 15 -w 60% -h 40% 'man -k . | fzf -q "$1" --prompt="man> " --preview-window=down:70% --preview "echo {} | tr -d \"()\" | awk \"{printf \\\"%s \\\", \$2} {print \$1}\" | xargs -r man" | tr -d "()" | awk "{printf \"%s \", \$2} {print \$1}" | xargs -r man'

# pane movement with smart-splits.nvim
bind -n C-Left if -F "#{@pane-is-vim}" 'send-keys C-Left'  'select-pane -L'
bind -n C-Right if -F "#{@pane-is-vim}" 'send-keys C-Right'  'select-pane -R'
bind -n C-Up if -F "#{@pane-is-vim}" 'send-keys C-Up'  'select-pane -U'
bind -n C-Down if -F "#{@pane-is-vim}" 'send-keys C-Down'  'select-pane -D'

bind L split-window -h -p 35 -c "#{pane_current_path}" "claude"

bind -n C-S-Left previous-window
bind -n C-S-Right next-window

bind-key "s" run-shell "sesh connect \"$(
  sesh list -t --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --reverse \
    --footer '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find ^n new' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-n:become(tmux new-session -d -s {q} -c ~ && echo {q})' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

setw -g mode-keys vi
# copy to system clipboard MacOS + WSL (https://www.grailbox.com/2020/08/use-system-clipboard-for-vi-copy-mode-in-tmux-in-macos-and-linux/)
# TODO: support linux
if-shell "uname | grep Darwin" {
   bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
   bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
   bind -T copy-mode-vi S-MouseDragEnd1Pane send-keys -X copy-selection -x 'reattach-to-user-namespace'
} {
   bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
   bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
   bind -T copy-mode-vi S-MouseDragEnd1Pane send-keys -X copy-selection -x "clip.exe"
}
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi S-MouseDown1Pane send-keys -X clear-selection
bind -T copy-mode-vi Escape send-keys -X cancel

#### Plugins
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.local/share/tmux/plugins'
if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'kenos1/tmux-cht-sh'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'Morantron/tmux-fingers'

run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'
